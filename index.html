<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>체감온도 계산기</title>

  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #d1d5db;
      --blue: #3b82f6;
      --normal: #6b7280;
      --interest: #38bdf8;
      --caution: #facc15;
      --warning: #fb923c;
      --danger: #ef4444;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
        "Noto Sans KR", "Segoe UI", sans-serif;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 18px 14px 40px;
    }

    h1 {
      margin: 6px 0 6px;
      font-size: 24px;
      letter-spacing: -0.8px;
    }

    .summary {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .section-title {
      margin: 24px 0 12px;
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .calculator-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(17, 24, 39, 0.06);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      margin-bottom: 7px;
      font-size: 15px;
      font-weight: 800;
    }

    .field input,
    .field select {
      width: 100%;
      height: 48px;
      border: 1px solid #9ca3af;
      border-radius: 8px;
      padding: 0 12px;
      background: #fff;
      color: var(--text);
      font-size: 17px;
      text-align: right;
      outline: none;
    }

    .field select {
      text-align: left;
      font-weight: 700;
      cursor: pointer;
    }

    .field input:focus,
    .field select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
    }

    .result-card {
      min-height: 86px;
      border-radius: 10px;
      background: #eef2f7;
      padding: 16px;
      text-align: center;
      transition: 0.15s ease;
    }

    .result-line {
      display: flex;
      justify-content: center;
      align-items: baseline;
      gap: 10px;
      flex-wrap: wrap;
      font-size: 16px;
      font-weight: 800;
    }

    .result-value {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: -0.8px;
    }

    .level-line {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 7px;
      margin-top: 8px;
      font-size: 15px;
      font-weight: 800;
    }

    .level-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      display: inline-block;
    }

    .level-desc {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .normal {
      color: var(--normal);
    }

    .interest {
      color: var(--interest);
    }

    .caution {
      color: #ca8a04;
    }

    .warning {
      color: #ea580c;
    }

    .danger {
      color: #dc2626;
    }

    .bg-normal {
      background: #eef2f7;
    }

    .bg-interest {
      background: #ecfeff;
    }

    .bg-caution {
      background: #fef9c3;
    }

    .bg-warning {
      background: #ffedd5;
    }

    .bg-danger {
      background: #fee2e2;
    }

    .dot-normal {
      background: var(--normal);
    }

    .dot-interest {
      background: var(--interest);
    }

    .dot-caution {
      background: var(--caution);
    }

    .dot-warning {
      background: var(--warning);
    }

    .dot-danger {
      background: var(--danger);
    }

    .legend {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 9px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      background: #fff;
      border: 1px solid var(--line);
    }

    .legend-mark {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .table-box {
      overflow: auto;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 14px;
      max-height: 70vh;
    }

    table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 13px;
    }

    th,
    td {
      min-width: 58px;
      padding: 9px 8px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      text-align: center;
      white-space: nowrap;
    }

    th {
      background: #f3f4f6;
      font-weight: 900;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 3;
    }

    .corner {
      background: #e5e7eb;
    }

    .side-title {
      background: #e5e7eb;
      font-weight: 900;
    }

    td {
      background: #fff;
      font-weight: 700;
    }

    td.cell-interest {
      background: #ecfeff;
    }

    td.cell-caution {
      background: #fef9c3;
    }

    td.cell-warning {
      background: #ffedd5;
    }

    td.cell-danger {
      background: #fee2e2;
    }

    td.selected {
      outline: 3px solid #ef4444;
      outline-offset: -3px;
      background: #fff1f2 !important;
      color: #dc2626;
      font-weight: 900;
    }

    .source {
      margin: 10px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .source a {
      color: #2563eb;
      font-weight: 800;
      text-decoration: none;
    }

    @media (max-width: 700px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .calculator-card {
        padding: 16px;
      }

      h1 {
        font-size: 22px;
      }

      .result-value {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <h1>체감온도 계산기</h1>
    <p class="summary" id="summaryText"></p>

    <h2 class="section-title">1. 체감온도 계산하기</h2>

    <section class="calculator-card">
      <div class="form-grid">
        <div class="field">
          <label for="seasonSelect">계절</label>
          <select id="seasonSelect">
            <option value="summer">여름</option>
            <option value="winter">겨울</option>
          </select>
        </div>

        <div class="field">
          <label for="tempInput">온도(℃)</label>
          <input type="number" id="tempInput" step="0.1" inputmode="decimal" placeholder="예: 30.7" />
        </div>

        <div class="field">
          <label for="envInput" id="envLabel">습도(%)</label>
          <input type="number" id="envInput" step="0.1" inputmode="decimal" placeholder="예: 60" />
        </div>
      </div>

      <div class="result-card bg-normal" id="resultCard">
        <div class="result-line">
          <span>체감온도 :</span>
          <span class="result-value normal" id="resultValue">-</span>
        </div>

        <div class="level-line">
          <span class="level-dot dot-normal" id="levelDot"></span>
          <span class="normal" id="levelText">입력 대기</span>
        </div>

        <p class="level-desc" id="levelDesc">온도와 값을 입력하면 자동으로 계산됩니다.</p>
      </div>
    </section>

    <h2 class="section-title">2. 체감온도 산출표</h2>

    <div class="legend" id="legendArea"></div>

    <section class="table-box" id="tableArea"></section>

    <p class="source" id="sourceText"></p>
  </main>

  <script>
    const KMA_URL = "https://data.kma.go.kr/climate/windChill/selectWindChillChart.do";

    let mode = "";
    let config = {};

    document.addEventListener("DOMContentLoaded", () => {
      mode = detectSeason();
      config = getConfig(mode);

      document.getElementById("seasonSelect").value = mode;

      bindEvents();
      renderAll();
      updateResult();
    });

    function bindEvents() {
      document.getElementById("seasonSelect").addEventListener("change", () => {
        mode = document.getElementById("seasonSelect").value;
        config = getConfig(mode);

        document.getElementById("envInput").value = "";

        renderAll();
        updateResult();
      });

      document.getElementById("tempInput").addEventListener("input", updateResult);
      document.getElementById("envInput").addEventListener("input", updateResult);
    }

    function detectSeason() {
      const month = new Date().getMonth() + 1;
      return month >= 5 && month <= 9 ? "summer" : "winter";
    }

    function getConfig(selectedMode) {
      if (selectedMode === "summer") {
        return {
          name: "여름",
          fullName: "여름철",
          period: "5~9월",
          envName: "습도",
          envUnit: "%",
          envLabel: "습도(%)",
          envPlaceholder: "예: 60",
          tempValues: range(25, 40, 1),
          rowValues: range(25, 100, 5)
        };
      }

      const winterTemps = [];
      for (let t = 10; t >= -40; t -= 5) {
        winterTemps.push(t);
      }

      return {
        name: "겨울",
        fullName: "겨울철",
        period: "10~익년 4월",
        envName: "풍속",
        envUnit: "m/s",
        envLabel: "풍속(m/s)",
        envPlaceholder: "예: 3.2",
        tempValues: winterTemps,
        rowValues: [1.3, 2.8, 4.2, 5.6, 6.9, 8.3, 9.7, 11.1, 12.5, 13.9, 15.3, 16.7]
      };
    }

    function renderAll() {
      const now = new Date();
      const autoMode = detectSeason() === "summer" ? "여름" : "겨울";

      document.getElementById("summaryText").innerText =
        `현재 날짜 기준 자동 감지 계절은 ${autoMode}입니다. 필요 시 계절을 직접 변경할 수 있습니다.`;

      document.getElementById("envLabel").innerText = config.envLabel;
      document.getElementById("envInput").placeholder = config.envPlaceholder;

      renderLegend();
      renderTable();

      document.getElementById("sourceText").innerHTML =
        `표 생성일: ${formatDate(now)} · 자료 기준: ` +
        `<a href="${KMA_URL}" target="_blank" rel="noopener">기상청 기상자료개방포털 체감온도</a> · ` +
        `현재 선택 기준: ${config.fullName}(${config.period})`;
    }

    function renderLegend() {
      const items = mode === "summer"
        ? [
            ["normal", "보통"],
            ["interest", "관심"],
            ["caution", "주의"],
            ["warning", "경고"],
            ["danger", "위험"]
          ]
        : [
            ["interest", "관심"],
            ["caution", "주의"],
            ["warning", "경고"],
            ["danger", "위험"]
          ];

      document.getElementById("legendArea").innerHTML = items.map(([key, label]) => `
        <span class="legend-item">
          <span class="legend-mark dot-${key}"></span>
          ${label}
        </span>
      `).join("");
    }

    function renderTable() {
      let html = `
        <table>
          <thead>
            <tr>
              <th class="corner" rowspan="2" colspan="2">구분</th>
              <th colspan="${config.tempValues.length}">기온(℃)</th>
            </tr>
            <tr>
              ${config.tempValues.map(t => `<th>${formatNumber(t)}</th>`).join("")}
            </tr>
          </thead>
          <tbody>
      `;

      config.rowValues.forEach((rowValue, rowIndex) => {
        html += `<tr>`;

        if (rowIndex === 0) {
          html += `<th class="side-title" rowspan="${config.rowValues.length}">${config.envLabel}</th>`;
        }

        html += `<th>${formatNumber(rowValue)}</th>`;

        config.tempValues.forEach((tempValue, colIndex) => {
          const apparent = calcApparentTemp(tempValue, rowValue);
          const level = getRiskLevel(apparent);

          html += `
            <td
              class="cell-${level.key}"
              data-row-index="${rowIndex}"
              data-col-index="${colIndex}"
            >
              ${apparent.toFixed(1)}
            </td>
          `;
        });

        html += `</tr>`;
      });

      html += `
          </tbody>
        </table>
      `;

      document.getElementById("tableArea").innerHTML = html;
    }

    function updateResult() {
      clearSelectedCell();

      const temp = parseFloat(document.getElementById("tempInput").value);
      const env = parseFloat(document.getElementById("envInput").value);

      const resultCard = document.getElementById("resultCard");
      const resultValue = document.getElementById("resultValue");
      const levelText = document.getElementById("levelText");
      const levelDot = document.getElementById("levelDot");
      const levelDesc = document.getElementById("levelDesc");

      if (Number.isNaN(temp) || Number.isNaN(env)) {
        setResultState("normal", "-", "입력 대기", "온도와 값을 입력하면 자동으로 계산됩니다.");
        return;
      }

      highlightNearestCell(temp, env);

      if (mode === "summer" && (env < 0 || env > 100)) {
        setResultState("warning", "확인 필요", "입력값 확인", "습도는 0~100% 범위로 입력해 주세요.");
        return;
      }

      if (mode === "winter" && (temp > 10 || env < 1.3)) {
        setResultState(
          "warning",
          "조건 미충족",
          "입력값 확인",
          "겨울철 체감온도는 기온 10℃ 이하, 풍속 1.3m/s 이상일 때 산출합니다."
        );
        return;
      }

      const apparent = calcApparentTemp(temp, env);
      const level = getRiskLevel(apparent);

      const desc =
        `${config.fullName} 기준 · 온도 ${temp}℃ · ${config.envName} ${env}${config.envUnit}`;

      setResultState(level.key, `${apparent.toFixed(2)}℃`, level.label, desc);
    }

    function setResultState(key, value, label, desc) {
      const resultCard = document.getElementById("resultCard");
      const resultValue = document.getElementById("resultValue");
      const levelText = document.getElementById("levelText");
      const levelDot = document.getElementById("levelDot");
      const levelDesc = document.getElementById("levelDesc");

      resultCard.className = `result-card bg-${key}`;
      resultValue.className = `result-value ${key}`;
      levelText.className = key;
      levelDot.className = `level-dot dot-${key}`;

      resultValue.innerText = value;
      levelText.innerText = label;
      levelDesc.innerText = desc;
    }

    function calcApparentTemp(tempC, envValue) {
      return mode === "summer"
        ? calcSummerApparentTemp(tempC, envValue)
        : calcWinterApparentTemp(tempC, envValue);
    }

    function calcSummerApparentTemp(tempC, humidity) {
      const Ta = tempC;
      const RH = humidity;

      const Tw =
        Ta * Math.atan(0.151977 * Math.sqrt(RH + 8.313659)) +
        Math.atan(Ta + RH) -
        Math.atan(RH - 1.67633) +
        0.00391838 * Math.pow(RH, 1.5) * Math.atan(0.023101 * RH) -
        4.686035;

      return (
        -0.2442 +
        0.55399 * Tw +
        0.45535 * Ta -
        0.0022 * Tw * Tw +
        0.00278 * Tw * Ta +
        3.0
      );
    }

    function calcWinterApparentTemp(tempC, windMs) {
      const Ta = tempC;
      const V = windMs * 3.6;

      return (
        13.12 +
        0.6215 * Ta -
        11.37 * Math.pow(V, 0.16) +
        0.3965 * Math.pow(V, 0.16) * Ta
      );
    }

    function getRiskLevel(value) {
      if (mode === "summer") {
        if (value >= 38) {
          return { key: "danger", label: "위험" };
        }

        if (value >= 35) {
          return { key: "warning", label: "경고" };
        }

        if (value >= 33) {
          return { key: "caution", label: "주의" };
        }

        if (value >= 31) {
          return { key: "interest", label: "관심" };
        }

        return { key: "normal", label: "보통" };
      }

      if (value < -15.4) {
        return { key: "danger", label: "위험" };
      }

      if (value < -10.5) {
        return { key: "warning", label: "경고" };
      }

      if (value < -3.2) {
        return { key: "caution", label: "주의" };
      }

      return { key: "interest", label: "관심" };
    }

    function clearSelectedCell() {
      document.querySelectorAll("td.selected").forEach(cell => {
        cell.classList.remove("selected");
      });
    }

    function highlightNearestCell(temp, env) {
      const colIndex = findNearestIndex(config.tempValues, temp);
      const rowIndex = findNearestIndex(config.rowValues, env);

      const targetCell = document.querySelector(
        `td[data-row-index="${rowIndex}"][data-col-index="${colIndex}"]`
      );

      if (targetCell) {
        targetCell.classList.add("selected");
      }
    }

    function findNearestIndex(values, target) {
      let nearestIndex = 0;
      let nearestDiff = Math.abs(values[0] - target);

      values.forEach((value, index) => {
        const diff = Math.abs(value - target);

        if (diff < nearestDiff) {
          nearestDiff = diff;
          nearestIndex = index;
        }
      });

      return nearestIndex;
    }

    function range(start, end, step) {
      const values = [];

      for (let v = start; v <= end; v += step) {
        values.push(Number(v.toFixed(1)));
      }

      return values;
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, "0");
      const d = String(date.getDate()).padStart(2, "0");

      return `${y}.${m}.${d}`;
    }

    function formatNumber(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }
  </script>
</body>
</html>
